<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Gunslingers Pinball Golf</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='13' fill='%232b1c10'/%3E%3Cpath d='M32 7 L38 24 L56 24 L41 35 L47 52 L32 42 L17 52 L23 35 L8 24 L26 24 Z' fill='%23f5c542' stroke='%23160d06' stroke-width='1.5'/%3E%3C/svg%3E" />
<meta name="theme-color" content="#2b1c10" />
<style>
  @font-face { font-family:'Wantedo'; src:url('assets/fonts/Wantedo.ttf') format('truetype'); font-display:swap; }
  :root { --gold:#f5c542; --cream:#f3eedd; --ink:#1b120a; --wood:#5a3a22; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; width:100%; overflow:hidden; background:#120c07; font-family:Georgia,serif; color:var(--cream); touch-action:none; user-select:none; }
  #wrap { position:fixed; inset:0; }
  canvas { position:absolute; inset:0; width:100%; height:100%; display:block; }
  #hud { pointer-events:none; z-index:10; }
  /* glassmorphism cards — frosted panes floating over the world, HUD type renders on top */
  .glass { position:absolute; z-index:5; pointer-events:none;
    background:rgba(255,243,219,.07); border:1px solid rgba(255,255,255,.20);
    border-radius:14px; backdrop-filter:blur(10px) saturate(1.25); -webkit-backdrop-filter:blur(10px) saturate(1.25);
    box-shadow:0 6px 26px rgba(22,10,4,.22), inset 0 1px 0 rgba(255,255,255,.16); }
  #glassTL { left:10px; top:8px; width:304px; height:130px; }
  #glassTR { right:10px; top:8px; width:188px; height:66px; }
  #glassPM { left:50%; bottom:26px; transform:translateX(-50%); width:352px; height:74px; }
  /* camera dock (right edge) */
  #cam { position:absolute; right:14px; top:50%; transform:translateY(-50%); display:flex; flex-direction:column; gap:8px; z-index:20; }
  #cam button {
    width:44px; height:44px; border:none; border-radius:0; cursor:pointer;
    background:transparent; color:var(--gold); font:900 24px Wantedo,Georgia;
    display:flex; align-items:center; justify-content:center;
    text-shadow:2px 2px 0 #100803, -1px -1px 0 #100803, 1px -1px 0 #100803, -1px 1px 0 #100803;
  }
  #cam button:active { transform:translateY(2px); color:#fff; }
  /* sound dock (bottom-right) */
  #snd { position:absolute; right:14px; bottom:14px; display:flex; gap:8px; z-index:20; }
  #snd button { width:44px; height:44px; border:none; border-radius:0; cursor:pointer;
    background:transparent; color:var(--gold); font-size:24px;
    display:flex; align-items:center; justify-content:center;
    text-shadow:2px 2px 0 #100803, -1px -1px 0 #100803, 1px -1px 0 #100803, -1px 1px 0 #100803; }
  #load { position:absolute; inset:0; z-index:60; display:flex; flex-direction:column; gap:14px;
    align-items:center; justify-content:center; background:#160f08; transition:opacity .4s; }
  #load.gone { opacity:0; pointer-events:none; }
  #load h1 { font-family:Wantedo,Georgia; color:var(--gold); font-size:8vmin; letter-spacing:1px; text-shadow:3px 3px 0 #160d06; }
  #load p { color:#c9a06a; font-size:3vmin; font-family:Wantedo,Georgia; }
  .spin { width:40px; height:40px; border-radius:50%; border:5px solid #3a2616; border-top-color:var(--gold); animation:s .9s linear infinite; }
  @keyframes s { to { transform:rotate(360deg); } }
</style>
</head>
<body>
  <div id="wrap">
    <canvas id="scene"></canvas>
    <div id="glassTL" class="glass"></div>
    <div id="glassTR" class="glass"></div>
    <div id="glassPM" class="glass"></div>
    <canvas id="hud"></canvas>
    <div id="cam">
      <button id="rotL" title="Rotate left">&#8634;</button>
      <button id="rotR" title="Rotate right">&#8635;</button>
      <button id="zin" title="Zoom in">+</button>
      <button id="zout" title="Zoom out">&minus;</button>
      <button id="vreset" title="Reset view">&#9678;</button>
    </div>
    <div id="snd">
      <button id="mute" title="Sound">&#128266;</button>
    </div>
    <div id="load">
      <h1>GUNSLINGERS</h1>
      <p>PINBALL&nbsp;GOLF</p>
      <div class="spin"></div>
    </div>
  </div>
  <script src="vendor/three.min.js"></script>
  <script src="js/pingolf.js?v=117"></script>
</body>
</html>
